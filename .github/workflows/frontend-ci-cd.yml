name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - master
      - development
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"
  pull_request:
    branches:
      - main
      - master
      - development
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Vercel deploy hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      - name: Wait for deployment
        run: sleep 60

      - name: Health check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VERCEL_PRODUCTION_URL }}")
          if [ "$status" -ne 200 ]; then
            echo "Health check failed with status $status"
            exit 1
          fi
          echo "Health check passed"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, build, deploy]
    if: always()

    steps:
      - name: Success message
        if: needs.deploy.result == 'success' || needs.deploy.result == 'skipped'
        run: echo "Frontend pipeline completed."

      - name: Failure message
        if: needs.lint.result == 'failure' || needs.build.result == 'failure' || needs.deploy.result == 'failure'
        run: echo "Frontend pipeline failed."
